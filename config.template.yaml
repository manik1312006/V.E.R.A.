# V.E.R.A. — Virtual Entity for Real-time Assistance
# Configuration Template — Copy to config.yaml and fill in your API key.
# NEVER commit config.yaml to version control!

# ─── LLM Settings ────────────────────────────────────────────────────────────
llm:
  # Powered by Gemini 2.5 Flash Live API
  provider: "gemini_live"

  gemini:
    api_key: ""           # Leave empty — V.E.R.A. will ask you on first run
                          # Get a free key at: https://aistudio.google.com/
    model: "models/gemini-2.5-flash-native-audio-latest"
    temperature: 1.0      # Gemini Live works best at 1.0

# ─── Voice Settings ──────────────────────────────────────────────────────────
voice:
  enabled: true           # Voice is handled natively by Gemini Live (always-on mic)
  language: "en-US"       # Spoken language hint

# ─── Screen Vision ────────────────────────────────────────────────────────────
screen:
  enabled: true           # Allow V.E.R.A. to capture screen on-demand
  capture_monitor: 1      # Monitor index (1 = primary display)
  jpeg_quality: 70        # JPEG quality for screen frames (1–95)

# ─── Interface Settings ──────────────────────────────────────────────────────
interface:
  theme: "dark"           # "dark" or "light"
  show_thinking: true
  max_history: 50

# ─── Safety Settings ─────────────────────────────────────────────────────────
safety:
  confirm_before_exec: false
  blocked_commands: []
  log_all_actions: true

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  scripts_dir: "scripts"
  custom_scripts_dir: "scripts/custom"
  logs_dir: "logs"
