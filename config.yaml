# V.E.R.A. - Virtual Entity for Real-time Assistance
# Configuration File

# ─── LLM Settings ────────────────────────────────────────────────────────────
llm:
  # Choose: "mistral_api" or "ollama_local"
  provider: "mistral_api"

  # Mistral API settings (required if provider is "mistral_api")
  mistral:
    api_key: ""  # Your Mistral API key from https://console.mistral.ai/
    model: "mistral-large-latest"
    temperature: 0.7
    max_tokens: 4096

  # Ollama settings (required if provider is "ollama_local")
  ollama:
    model: "mistral"
    base_url: "http://localhost:11434"
    temperature: 0.7

# ─── Voice Settings ──────────────────────────────────────────────────────────
voice:
  # Enable voice features
  enabled: false

  # Speech-to-Text settings
  stt:
    engine: "faster_whisper"  # "faster_whisper"
    model_size: "base"        # tiny, base, small, medium, large-v3
    language: "en"

  # Text-to-Speech settings
  tts:
    engine: "edge_tts"        # "edge_tts" or "pyttsx3"
    voice: "en-US-JennyNeural"  # edge-tts voice name
    rate: "+0%"               # Speech rate adjustment
    volume: "+0%"             # Volume adjustment

  # How many seconds to record when voice input is triggered
  listen_duration: 7          # seconds (increase if you speak slowly)

# ─── Interface Settings ──────────────────────────────────────────────────────
interface:
  theme: "dark"               # "dark" or "light"
  show_thinking: true         # Show LLM reasoning steps
  max_history: 50             # Max conversation turns to remember

# ─── Safety Settings ─────────────────────────────────────────────────────────
safety:
  # User chose unrestricted mode — all actions execute immediately
  confirm_before_exec: false
  blocked_commands: []        # Commands to never execute (empty = none)
  log_all_actions: true       # Log every action taken

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  scripts_dir: "scripts"
  custom_scripts_dir: "scripts/custom"
  logs_dir: "logs"
